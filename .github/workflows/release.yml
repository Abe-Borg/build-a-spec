name: Release (Windows)

# Builds the shippable Windows installer on a Windows runner and, when a
# version tag (v*) is pushed, publishes it as a GitHub Release with the
# SHA-256 update manifest the in-app updater consumes.
#
#   Cut a release:   bump VERSION in backend/settings.py + frontend/package.json,
#                    commit, then:  git tag v0.9.0 && git push origin v0.9.0
#   Test the build:  Actions -> "Release (Windows)" -> Run workflow. A manual
#                    run builds and uploads the installer as a downloadable
#                    run artifact but does NOT publish a Release (only a
#                    pushed tag does — the publish step is tag-gated).
#
# Everything users need is bundled — the PyInstaller build carries its own
# Python interpreter and dependencies, and the installer pulls in the Edge
# WebView2 runtime if it's missing — so an end user installs a single .exe
# with no Python, Node, or other tooling on their machine.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # create the GitHub Release and upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'   # lowest-risk pythonnet/pywebview wheel matrix
          cache: pip

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve version and tag
        id: ver
        shell: pwsh
        run: |
          $settings = Get-Content backend/settings.py -Raw
          if ($settings -notmatch '(?m)^VERSION\s*=\s*"([^"]+)"') {
            throw "VERSION not found in backend/settings.py"
          }
          $version = $Matches[1]
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $tag = $env:GITHUB_REF_NAME
          } else {
            $tag = "v$version"
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building version=$version tag=$tag"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # pywebview's Edge WebView2 backend loads through pythonnet/clr on
          # Windows. It's kept out of requirements.txt (it needs .NET and
          # breaks a plain Linux `pip install`), so install it here on the
          # Windows runner to guarantee PyInstaller bundles the native backend.
          pip install pythonnet
          pip install pyinstaller

      - name: Version consistency gate
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            python packaging/windows/check_release_version.py --tag ${{ steps.ver.outputs.tag }}
          } else {
            python packaging/windows/check_release_version.py
          }

      - name: Run backend tests
        env:
          BUILD_A_SPEC_DISABLE_UPDATE_CHECK: '1'
        run: python -m pytest -q

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Freeze with PyInstaller
        run: pyinstaller packaging/windows/build-a-spec.spec --noconfirm --clean

      - name: Smoke-test the frozen app
        shell: pwsh
        run: |
          $exe = "dist/BuildASpec/BuildASpec.exe"
          if (-not (Test-Path $exe)) { throw "frozen exe not found at $exe" }

          # The app is windowed (console=False), so its stdout is detached
          # from this console; app_entry.py mirrors output to the file named
          # by BUILD_A_SPEC_SELFCHECK_OUT. Start-Process -Wait blocks on the
          # GUI-subsystem process and surfaces its real exit code.
          $env:BUILD_A_SPEC_SELFCHECK_OUT = "$PWD\version.txt"
          Start-Process -FilePath $exe -ArgumentList '--version' -Wait
          $reportedVersion = (Get-Content version.txt -Raw).Trim()
          Write-Host "reported version: $reportedVersion"
          if ($reportedVersion -ne "${{ steps.ver.outputs.version }}") {
            throw "frozen app reports '$reportedVersion', expected '${{ steps.ver.outputs.version }}'"
          }

          $env:BUILD_A_SPEC_SELFCHECK_OUT = "$PWD\selfcheck.txt"
          $p = Start-Process -FilePath $exe -ArgumentList '--selfcheck' -Wait -PassThru
          Write-Host "--- selfcheck output ---"
          if (Test-Path selfcheck.txt) { Get-Content selfcheck.txt }
          if ($p.ExitCode -ne 0) { throw "selfcheck failed (exit $($p.ExitCode))" }

      - name: Download Edge WebView2 bootstrapper
        shell: pwsh
        run: |
          # Evergreen bootstrapper (~2 MB). Bundled into the installer, which
          # runs it silently only on machines missing the WebView2 runtime.
          $url = "https://go.microsoft.com/fwlink/p/?LinkId=2124703"
          $dest = "packaging/windows/MicrosoftEdgeWebview2Setup.exe"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          $size = (Get-Item $dest).Length
          Write-Host "WebView2 bootstrapper: $size bytes"
          if ($size -lt 100000) { throw "WebView2 bootstrapper download looks too small ($size bytes)" }

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          # Inno Setup 6 is pre-installed on windows-2022/2025 runners with
          # `iscc` on PATH; fall back to installing it only if that changes.
          $cmd = Get-Command iscc -ErrorAction SilentlyContinue
          if ($cmd) {
            $iscc = $cmd.Source
          } else {
            choco install innosetup --no-progress -y
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found ($iscc)" }
          Write-Host "Using ISCC: $iscc"
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" packaging/windows/installer.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed (exit $LASTEXITCODE)" }
          if (-not (Test-Path "dist/installer/BuildASpecSetup.exe")) {
            throw "installer not produced at dist/installer/BuildASpecSetup.exe"
          }

      - name: Generate update manifest (latest.json)
        shell: pwsh
        run: |
          $tag = "${{ steps.ver.outputs.tag }}"
          $downloadUrl = "https://github.com/Abe-Borg/build-a-spec/releases/download/$tag/BuildASpecSetup.exe"
          python packaging/windows/make_manifest.py `
            --version "${{ steps.ver.outputs.version }}" `
            --installer "dist/installer/BuildASpecSetup.exe" `
            --url "$downloadUrl" `
            --out "dist/installer/latest.json" `
            --notes "Build-a-Spec ${{ steps.ver.outputs.version }} — see the release page for details." `
            --published-at (Get-Date -Format 'yyyy-MM-dd')
          Get-Content dist/installer/latest.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BuildASpec-${{ steps.ver.outputs.version }}-windows
          path: |
            dist/installer/BuildASpecSetup.exe
            dist/installer/latest.json
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Build-a-Spec ${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          # GitHub prepends `body` to the auto-generated changelog when both
          # are set, so the install/SmartScreen notes lead and the changelog
          # follows.
          generate_release_notes: true
          files: |
            dist/installer/BuildASpecSetup.exe
            dist/installer/latest.json
          body: |
            ## Install (Windows)

            1. Download **BuildASpecSetup.exe** below and run it.
            2. The app is not code-signed, so Windows SmartScreen shows
               **"Windows protected your PC"** on first run — click
               **More info → Run anyway**. This is expected; downloads are
               SHA-256-verified against `latest.json` before the in-app
               updater ever launches a future update.
            3. No Python, Node, or other tooling is required — everything is
               bundled. The installer adds the Microsoft Edge WebView2
               runtime automatically if your machine doesn't already have it
               (current Windows 10/11 already do).

            After installing, launch **Build-a-Spec** from the Start menu and
            enter your Anthropic API key when prompted.

            `latest.json` is the update manifest consumed by the built-in
            updater — it is not something you need to download.
